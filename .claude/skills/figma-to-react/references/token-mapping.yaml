  Numeric Tokens:
    title: Numeric Tokens
    file: build/scss/_numeric-tokens.scss
    subsections:
      Spacing:
        - name: spacing-none
          value: 0px
          type: dimension
          description: '(0px). Use when elements should have no gap or padding between them (e.g both consecutive sections have white bg, so the next section will have a 0px top padding to avoid an excessive spacing).'
        - name: spacing-2xs
          value: 4px
          type: dimension
          description: (4px). Use for very tight spacing like icon-to-text gaps or subtle padding.
        - name: spacing-xs
          value: 8px
          type: dimension
          description: (8px). Use for compact component internal spacing or small gaps between related elements.
        - name: spacing-sm
          value: 12px
          type: dimension
          description: (12px). Use for moderate padding within components or gaps between closely related items.
        - name: spacing-md
          value: 16px
          type: dimension
          description: (16px). Default spacing for most component padding and gaps. Our baseline spacing unit.
        - name: spacing-lg
          value: 24px
          type: dimension
          description: (24px). Use for generous component padding or gaps between distinct sections.
        - name: spacing-xl
          value: 32px
          type: dimension
          description: (32px). Use for significant separation between components or section padding.
        - name: spacing-2xl
          value: 40px
          type: dimension
          description: (40px). Use for separation between content blocks within a section.
        - name: spacing-3xl
          value: 48px
          type: dimension
          description: (48px). Use for vertical separation between sections.
        - name: spacing-4xl
          value: 64px
          type: dimension
          description: (64px). Use for maximum spacing between distinct page areas or special layout needs.
      Radius:
        - name: radius-square
          value: 0px
          type: borderRadius
          description: Sharp corners with no rounding (0px). Use for rectangular elements requiring hard edges.
        - name: radius-sm
          value: 6px
          type: borderRadius
          description: Small corner radius (6px). Use for subtle rounding on cards and other UI elements.
        - name: radius-md
          value: 8px
          type: borderRadius
          description: Medium corner radius (8px). Standard rounding for most components like inputs
        - name: radius-lg
          value: 24px
          type: borderRadius
          description: Large corner radius (24px). Use for Search Typeahead menus and pill-shaped items (e.g. Quantity Stepper).
        - name: radius-xl
          value: 32px
          type: borderRadius
          description: Extra-large corner radius (32px). Use for Sheet top corners and decorative large-surface use cases.
        - name: radius-full
          value: 1000px
          type: borderRadius
          description: 'Fully rounded borders for pill-shaped and circular elements. Browsers clamp border-radius to min(width, height) / 2, so this value produces a circle on square elements and a pill on rectangles.'
      Size:
        - name: size-height-xs
          value: 24px
          type: dimension
          description: (24px). Use as the base icon height and smaller elements.
        - name: size-height-sm
          value: 32px
          type: dimension
          description: (32px). Use it as the fixed height for Small Buttons and sm variants.
        - name: size-height-md
          value: 40px
          type: dimension
          description: (40px). Fixed height for default Chips (md)..
        - name: size-height-lg
          value: 48px
          type: dimension
          description: (48px). Fixed height for Large Buttons and other large component variants (lg).
        - name: size-height-xl
          value: 72px
          type: dimension
          description: (72px). Height for xl icon buttons and chips.
        - name: size-height-icon-xs
          value: 16px
          type: dimension
          description: (16px). Height for the smallest icon size (Small Button)
        - name: size-height-icon-sm
          value: 20px
          type: dimension
          description: (20px). Height for the icon in a Large Button.
        - name: size-height-icon-md
          value: 24px
          type: dimension
          description: (24px). Default size for most standalone icons and instances in icon buttons.
        - name: size-height-icon-lg
          value: 32px
          type: dimension
          description: (32px). Default size for most standalone icons and instances in icon buttons.
        - name: size-height-icon-2xl
          value: 64px
          type: dimension
          description: (64px). Default size for most standalone icons and instances in icon buttons.
        - name: size-height-icon-4xl
          value: 80px
          type: dimension
          description: (80px). Max height of a highlighted icon (e.g. a more detailed icon of a feature of benefit on a landing page).
        - name: size-width-button-mw-lg
          value: 128px
          type: dimension
          description: (128px). Ensures large buttons have substantial clickable area and prominent visual hierarchy.
        - name: size-width-button-mw-sm
          value: 96px
          type: dimension
          description: (96px). Ensures small buttons have adequate clickable area and visual presence.
