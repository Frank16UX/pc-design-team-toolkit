  Responsive/Desktop:
    title: Responsive / Desktop
    file: build/scss/_responsive-desktop.scss
    subsections:
      Typography:
        - name: desktop-typography-display-xl
          type: typography
          mixin: desktop-typography-display-xl
          composite:
            fontFamily: Questa
            fontWeight: Medium Italic
            fontSize: 104px
            lineHeight: 104px
            paragraphSpacing: 20px
          description: $desktop-typography-display-xl — Use for the largest display text in hero sections and major headings.
        - name: desktop-typography-display-lg
          type: typography
          mixin: desktop-typography-display-lg
          composite:
            fontFamily: Questa
            fontWeight: Medium Italic
            fontSize: 80px
            lineHeight: 80px
            paragraphSpacing: 20px
          description: $desktop-typography-display-lg — Use for large display text in prominent hero sections.
        - name: desktop-typography-display-md
          type: typography
          mixin: desktop-typography-display-md
          composite:
            fontFamily: Questa
            fontWeight: Medium Italic
            fontSize: 64px
            lineHeight: 64px
            paragraphSpacing: 20px
          description: $desktop-typography-display-md — Use for medium display text in featured sections and banners.
        - name: desktop-typography-display-sm
          type: typography
          mixin: desktop-typography-display-sm
          composite:
            fontFamily: Questa
            fontWeight: Medium Italic
            fontSize: 48px
            lineHeight: 48px
            paragraphSpacing: 20px
          description: $desktop-typography-display-sm — Use for smaller display text in secondary hero sections.
        - name: desktop-typography-display-xs
          type: typography
          mixin: desktop-typography-display-xs
          composite:
            fontFamily: Questa
            fontWeight: Medium Italic
            fontSize: 40px
            lineHeight: 48px
            paragraphSpacing: 20px
          description: $desktop-typography-display-xs — Use for the smallest display text in tertiary featured content.
        - name: desktop-typography-headline-xl
          type: typography
          mixin: desktop-typography-headline-xl
          composite:
            fontFamily: Questa
            fontWeight: '400'
            fontSize: 36px
            lineHeight: 44px
            paragraphSpacing: 20px
          description: $desktop-typography-headline-xl — Use for extra large section headlines and page titles.
        - name: desktop-typography-headline-lg
          type: typography
          mixin: desktop-typography-headline-lg
          composite:
            fontFamily: Questa
            fontWeight: '400'
            fontSize: 32px
            lineHeight: 38px
            paragraphSpacing: 20px
          description: $desktop-typography-headline-lg — Use for large section headlines and major content groupings.
        - name: desktop-typography-headline-md
          type: typography
          mixin: desktop-typography-headline-md
          composite:
            fontFamily: Questa
            fontWeight: '400'
            fontSize: 28px
            lineHeight: 34px
            paragraphSpacing: 20px
          description: $desktop-typography-headline-md — Use for medium section headlines and subsection titles.
        - name: desktop-typography-headline-sm
          type: typography
          mixin: desktop-typography-headline-sm
          composite:
            fontFamily: Questa
            fontWeight: '400'
            fontSize: 24px
            lineHeight: '120%'
            paragraphSpacing: 20px
          description: $desktop-typography-headline-sm — Use for small section headlines and card titles.
        - name: desktop-typography-price-lg
          type: typography
          mixin: desktop-typography-price-lg
          composite:
            fontFamily: Lexend
            fontWeight: '500'
            fontSize: 28px
            lineHeight: '132%'
            paragraphSpacing: 20px
          description: $desktop-typography-price-lg — Use to display current product’s PDP.
        - name: desktop-typography-price-lg-strikethrough
          type: typography
          mixin: desktop-typography-price-lg-strikethrough
          composite:
            fontFamily: Lexend
            fontWeight: '500'
            fontSize: 28px
            lineHeight: '132%'
            paragraphSpacing: 20px
